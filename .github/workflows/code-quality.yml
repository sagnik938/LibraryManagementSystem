name: Code Quality Analysis

on:
  pull_request:
    branches: [main, develop]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  dotnet-analysis:
    name: .NET Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build with analyzers
        id: build
        run: |
          dotnet build --no-restore -warnaserror 2>&1 | tee build_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run dotnet format check
        id: format
        run: |
          dotnet format --verify-no-changes 2>&1 | tee format_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            build_output.txt
            format_output.txt

      - name: Create GitHub Issue on violation
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const buildOutput = fs.existsSync('build_output.txt') 
              ? fs.readFileSync('build_output.txt', 'utf8') 
              : 'No output';
            const formatOutput = fs.existsSync('format_output.txt') 
              ? fs.readFileSync('format_output.txt', 'utf8') 
              : 'No output';

            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prUrl = context.payload.pull_request.html_url;
            const author = context.payload.pull_request.user.login;

            // Check for existing open issue for this PR
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-detected',
              state: 'open'
            });

            const alreadyExists = existing.data.some(i => 
              i.title.includes(`PR #${prNumber}`)
            );

            if (!alreadyExists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Code Quality] Violations in PR #${prNumber}: ${prTitle}`,
                body: `## Code Quality Violations Detected\n\n` +
                      `**PR:** [#${prNumber}](${prUrl})\n` +
                      `**Author:** @${author}\n` +
                      `**Branch:** \`${{ github.head_ref }}\`\n\n` +
                      `---\n\n` +
                      `### Build / Analyzer Output\n\`\`\`\n${buildOutput.slice(0, 3000)}\n\`\`\`\n\n` +
                      `### Format Check Output\n\`\`\`\n${formatOutput.slice(0, 1500)}\n\`\`\`\n\n` +
                      `---\n_This issue was created automatically by the Code Quality workflow._`,
                labels: ['code-quality', 'auto-detected', 'dotnet'],
                assignees: ['${author}']
              });
            }

      - name: Comment on PR with results
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ❌ Code Quality Check Failed\n\n` +
                    `Violations were detected and a tracking issue has been created.\n\n` +
                    `**Fix checklist:**\n` +
                    `- [ ] Review analyzer warnings in the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n` +
                    `- [ ] Run \`dotnet format\` locally\n` +
                    `- [ ] Run \`dotnet build -warnaserror\` locally to confirm clean\n` +
                    `- [ ] Push fixes and re-run checks`
            });

      - name: Comment on PR with success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ✅ Code Quality Checks Passed\n\nNo violations detected. Good to review!`
            });